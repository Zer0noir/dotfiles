# See https://wiki.hypr.land/Configuring/Window-Rules/
# See https://wiki.hypr.land/Configuring/Workspace-Rules/

# Suprimir maximize events
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags

    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {

	name = float-blueman
	match:class = blueman-manager
	float = yes
	center = yes
	size = 900 600
	
}

windowrule {
	name=float-pavucontrol
	match:class=org.pulseaudio.pavucontrol
	float = yes
	center = yes
	size = 900 600
}

windowrule {
    name=wlogout
    match:class=wlogout
    float=yes
    center=yes

}
windowrule {
        name=waypaper
        match:class=waypaper
        float = yes
        center = yes
        size = 900 600
}
